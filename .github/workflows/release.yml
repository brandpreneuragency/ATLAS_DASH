name: Release TABS

# Triggers on any tag like v1.0.0, v1.2.3, v2.0.0-beta.1, etc.
on:
  push:
    tags:
      - 'v*'

# Required so the action can create / update the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    name: Build & publish (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        with:
          # Use the tag that triggered the workflow (e.g. v1.0.1).
          tagName: ${{ github.ref_name }}
          releaseName: 'TABS ${{ github.ref_name }}'
          releaseDraft: true
          # Include auto-generated notes in the release body.
          releaseBody: |
            See the assets below to install TABS ${{ github.ref_name }}.

            **Full Changelog**: https://github.com/brandpreneuragency/TABS/compare/${{ github.ref_name }}...HEAD
          prerelease: false
          args: ${{ matrix.args }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Optional: Tauri update signing. To enable, generate a key with
          #   npx @tauri-apps/cli signer generate -w ${{ runner.temp }}/tabs.key
          # and add these two secrets to the repo:
          #   TAURI_SIGNING_PRIVATE_KEY      (contents of tabs.key)
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # Then paste the public key into src-tauri/tauri.conf.json
          # under plugins.updater.pubkey.
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
