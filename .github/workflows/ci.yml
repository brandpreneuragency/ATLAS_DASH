name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: modelmonitor
          POSTGRES_PASSWORD: modelmonitor
          POSTGRES_DB: modelmonitor
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U modelmonitor -d modelmonitor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://modelmonitor:modelmonitor@localhost:5433/modelmonitor
      AUTH_SECRET: ci-test-secret-not-production
      AUTH_DEV_BYPASS: "true"
      ALLOWED_EMAILS: owner@example.com
      APP_BASE_URL: http://127.0.0.1:3000
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Frozen install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @model-monitor/web exec playwright install chromium --with-deps

      - name: Migrate (first)
        run: pnpm --filter @model-monitor/database db:migrate

      - name: Migrate (second no-op + checksum verify)
        run: pnpm --filter @model-monitor/database db:migrate

      - name: Seed (first)
        run: pnpm --filter @model-monitor/database db:seed

      - name: Seed (second idempotent)
        run: pnpm --filter @model-monitor/database db:seed

      - name: Lint
        run: pnpm exec turbo lint --force

      - name: Typecheck
        run: pnpm exec turbo typecheck --force

      - name: Unit tests
        run: pnpm exec turbo test:unit --force

      - name: Integration tests
        run: pnpm exec turbo test:integration --force

      - name: E2E tests
        run: pnpm exec turbo test:e2e --force

      - name: Upload Playwright diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            apps/web/test-results/**
            apps/web/playwright-report/**
            apps/web/blob-report/**
          if-no-files-found: ignore

      - name: Build
        run: pnpm exec turbo build --force

      - name: Final seed integrity
        if: always()
        run: pnpm --filter @model-monitor/database exec tsx src/seed-integrity.test.ts

      - name: Assert zero leaked fixtures before cleanup
        if: always()
        run: pnpm --filter @model-monitor/database exec tsx src/assert-no-test-fixtures.ts

      - name: Cleanup fixtures
        if: always()
        run: pnpm --filter @model-monitor/database exec tsx src/cleanup-test-models.ts

      - name: Re-assert zero fixtures after cleanup
        if: always()
        run: pnpm --filter @model-monitor/database exec tsx src/assert-no-test-fixtures.ts

      - name: Artifact cleanliness
        if: success()
        run: |
          set -euo pipefail
          if git ls-files | grep -E 'test-results|playwright-report|blob-report|\.last-run\.json|coverage/' ; then
            echo "Tracked generated artifacts found" >&2
            exit 1
          fi
          if [ -d apps/web/test-results ] || [ -d apps/web/playwright-report ] || [ -d apps/web/blob-report ]; then
            echo "Untracked Playwright output directories present after success" >&2
            find apps/web -maxdepth 2 -type d \( -name test-results -o -name playwright-report -o -name blob-report \) -print
            exit 1
          fi
          echo "artifact cleanliness ok"
