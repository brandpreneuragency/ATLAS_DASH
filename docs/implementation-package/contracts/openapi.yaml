openapi: 3.1.0
info:
  title: Model Monitor API
  version: 1.0.0
  description: Private model registry, subscription management, and Hermes catalog API.
servers:
  - url: /api/v1
security:
  - sessionAuth: []
paths:
  /health:
    get:
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, database, time]
                properties:
                  status: { type: string, const: ok }
                  database: { type: string, const: ok }
                  time: { type: string, format: date-time }
  /models:
    get:
      operationId: listModels
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: developer, in: query, schema: { type: string } }
        - { name: family, in: query, schema: { type: string } }
        - { name: accessProvider, in: query, schema: { type: string } }
        - { name: subscription, in: query, schema: { type: string } }
        - { name: capability, in: query, schema: { type: string } }
        - { name: capabilityVision, in: query, schema: { type: boolean } }
        - { name: capabilityReasoning, in: query, schema: { type: boolean } }
        - { name: capabilityToolUse, in: query, schema: { type: boolean } }
        - { name: lifecycle, in: query, schema: { type: string, enum: [current, ga, preview, beta, legacy, deprecated, retired, unavailable, unknown] } }
        - { name: needsRecheck, in: query, schema: { type: boolean } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: accessible, in: query, schema: { type: boolean } }
        - { name: archived, in: query, schema: { type: boolean, default: false } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
      responses:
        '200':
          description: Model collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCollection'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createModel
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModelWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
  /models/{modelId}:
    parameters:
      - { name: modelId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getModel
      responses:
        '200':
          description: Model
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateModel
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModelPatch' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict (unique constraint or merged-source immutability)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: archiveModel
      responses:
        '204': { description: Archived }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict (merged-source immutability)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /models/{modelId}/restore:
    post:
      operationId: restoreModel
      parameters:
        - { name: modelId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict when restoring a merged source tombstone
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /models/merge:
    post:
      operationId: mergeModels
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceModelId, targetModelId]
              properties:
                sourceModelId: { type: string, format: uuid }
                targetModelId: { type: string, format: uuid }
                resolutions:
                  type: object
                  additionalProperties: false
                  properties:
                    name: { type: string }
                    canonicalId: { type: string }
                    family: { type: [string, 'null'] }
                    generation: { type: [string, 'null'] }
                    lifecycle:
                      type: string
                      enum: [current, ga, preview, beta, legacy, deprecated, retired, unavailable, unknown]
                    lifecycleRaw: { type: [string, 'null'] }
                    releaseDate: { type: [string, 'null'], format: date }
                    knowledgeCutoff: { type: [string, 'null'] }
                    modelType: { type: [string, 'null'] }
                    description: { type: [string, 'null'] }
                    codingSpecialization: { type: [string, 'null'] }
                    bestUse: { type: [string, 'null'] }
                    avoidFor: { type: [string, 'null'] }
                    contextTokens: { type: [integer, 'null'], minimum: 0 }
                    maxOutputTokens: { type: [integer, 'null'], minimum: 0 }
                    speedRating: { type: [string, 'null'] }
                    developerId: { type: string, format: uuid }
      responses:
        '200':
          description: Merge result
          headers:
            Idempotency-Replayed:
              schema: { type: string, enum: ['true'] }
              description: Present when a prior identical request is replayed
          content:
            application/json:
              schema:
                type: object
                required: [targetModelId, transferred, auditEventId]
                properties:
                  targetModelId: { type: string, format: uuid }
                  sourceModelId: { type: string, format: uuid }
                  transferred: { type: object, additionalProperties: { type: integer } }
                  auditEventId: { type: string, format: uuid }
                  appliedResolutions: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /developers:
    get:
      operationId: listDevelopers
      responses:
        '200':
          description: Developers
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, name, slug]
                      properties:
                        id: { type: string, format: uuid }
                        name: { type: string }
                        slug: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /models/{modelId}/aliases:
    parameters:
      - { name: modelId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: addModelAlias
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModelAliasWrite' }
      responses:
        '201':
          description: Alias created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelAlias' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /models/{modelId}/history:
    parameters:
      - { name: modelId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getModelHistory
      responses:
        '200':
          description: Model audit history
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /subscriptions:
    get:
      operationId: listSubscriptions
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Subscription' }
    post:
      operationId: createSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubscriptionWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
  /subscriptions/{subscriptionId}:
    parameters:
      - { name: subscriptionId, in: path, required: true, schema: { type: string } }
    get:
      operationId: getSubscription
      responses:
        '200':
          description: Subscription
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
    patch:
      operationId: updateSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubscriptionWrite' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
    delete:
      operationId: archiveSubscription
      responses:
        '204': { description: Archived }
  /model-access:
    get:
      operationId: listModelAccess
      responses:
        '200':
          description: Access records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ModelAccess' }
    post:
      operationId: createModelAccess
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModelAccessWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelAccess' }
  /access-matrix:
    get:
      operationId: getAccessMatrix
      responses:
        '200':
          description: Matrix
          content:
            application/json:
              schema:
                type: object
                required: [models, subscriptions, cells]
                properties:
                  models: { type: array, items: { type: object, additionalProperties: true } }
                  subscriptions: { type: array, items: { type: object, additionalProperties: true } }
                  cells: { type: array, items: { type: object, additionalProperties: true } }
  /imports/preview:
    post:
      operationId: previewImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '202':
          description: Preview accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportJob' }
  /imports/{importId}:
    get:
      operationId: getImport
      parameters:
        - { name: importId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Import
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportJob' }
  /imports/{importId}/commit:
    post:
      operationId: commitImport
      parameters:
        - { name: importId, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      responses:
        '200':
          description: Committed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportJob' }
  /audit-events:
    get:
      operationId: listAuditEvents
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
  /hermes/catalog:
    get:
      operationId: getHermesCatalog
      security:
        - bearerAuth: [catalog:read]
      responses:
        '200':
          description: Hermes catalog
          headers:
            ETag: { schema: { type: string } }
            Last-Modified: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
                description: Must validate against contracts/hermes-catalog.schema.json.
        '304': { description: Not modified }
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: authjs.session-token
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    Unauthorized:
      description: Authentication required or email not allow-listed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
            fieldErrors: { type: object, additionalProperties: { type: array, items: { type: string } } }
    Model:
      type: object
      required: [id, canonicalId, name, developerId, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        canonicalId: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        developerId: { type: string, format: uuid }
        family: { type: [string, 'null'] }
        generation: { type: [string, 'null'] }
        lifecycle: { type: string, enum: [current, ga, preview, beta, legacy, deprecated, retired, unavailable, unknown] }
        lifecycleRaw: { type: [string, 'null'] }
        releaseDate: { type: [string, 'null'], format: date }
        knowledgeCutoff: { type: [string, 'null'] }
        modelType: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        codingSpecialization: { type: [string, 'null'] }
        contextTokens: { type: [integer, 'null'], minimum: 0 }
        maxOutputTokens: { type: [integer, 'null'], minimum: 0 }
        bestUse: { type: [string, 'null'] }
        avoidFor: { type: [string, 'null'] }
        speedRating: { type: [string, 'null'] }
        verifiedTps: { type: [number, 'null'], minimum: 0 }
        needsRecheck: { type: boolean }
        capabilities: { type: [object, 'null'], additionalProperties: true }
        aliases: { type: array, items: { $ref: '#/components/schemas/ModelAlias' } }
        status: { type: string, enum: [active, archived] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ModelWrite:
      type: object
      required: [canonicalId, name, developerId]
      properties:
        canonicalId: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        developerId: { type: string, format: uuid }
        family: { type: [string, 'null'] }
        generation: { type: [string, 'null'] }
        lifecycle:
          type: string
          enum: [current, ga, preview, beta, legacy, deprecated, retired, unavailable, unknown]
        lifecycleRaw: { type: [string, 'null'] }
        releaseDate: { type: [string, 'null'], format: date }
        knowledgeCutoff: { type: [string, 'null'] }
        modelType: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        codingSpecialization: { type: [string, 'null'] }
        contextTokens: { type: [integer, 'null'], minimum: 0 }
        maxOutputTokens: { type: [integer, 'null'], minimum: 0 }
        bestUse: { type: [string, 'null'] }
        avoidFor: { type: [string, 'null'] }
        speedRating: { type: [string, 'null'] }
        needsRecheck: { type: boolean }
        capabilities:
          type: object
          additionalProperties: true
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/ModelAliasWrite'
    ModelPatch:
      type: object
      description: Partial model update payload (all fields optional; mirrors modelUpdateSchema)
      additionalProperties: false
      properties:
        canonicalId: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        developerId: { type: string, format: uuid }
        family: { type: [string, 'null'] }
        generation: { type: [string, 'null'] }
        lifecycle:
          type: string
          enum: [current, ga, preview, beta, legacy, deprecated, retired, unavailable, unknown]
        lifecycleRaw: { type: [string, 'null'] }
        releaseDate: { type: [string, 'null'], format: date }
        knowledgeCutoff: { type: [string, 'null'] }
        modelType: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        codingSpecialization: { type: [string, 'null'] }
        contextTokens: { type: [integer, 'null'], minimum: 0 }
        maxOutputTokens: { type: [integer, 'null'], minimum: 0 }
        bestUse: { type: [string, 'null'] }
        avoidFor: { type: [string, 'null'] }
        speedRating: { type: [string, 'null'] }
        needsRecheck: { type: boolean }
        capabilities:
          type: object
          additionalProperties: true
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/ModelAliasWrite'
    ModelAliasWrite:
      type: object
      required: [alias]
      additionalProperties: false
      properties:
        alias: { type: string, minLength: 1 }
        aliasType:
          type: string
          enum: [display, short, provider, legacy, other]
          default: display
        accessProviderId: { type: [string, 'null'], format: uuid }
    ModelAlias:
      type: object
      required: [id, alias, aliasType]
      properties:
        id: { type: string, format: uuid }
        alias: { type: string, minLength: 1 }
        aliasType:
          type: string
          enum: [display, short, provider, legacy, other]
        accessProviderId: { type: [string, 'null'], format: uuid }
        normalizedAlias: { type: string }
        createdAt: { type: [string, 'null'], format: date-time }
    ModelCollection:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Model' } }
        page:
          type: object
          required: [hasMore]
          properties:
            nextCursor: { type: [string, 'null'] }
            hasMore: { type: boolean }
    Subscription:
      allOf:
        - { $ref: '#/components/schemas/SubscriptionWrite' }
        - type: object
          required: [id, createdAt, updatedAt]
          properties:
            id: { type: string }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    SubscriptionWrite:
      type: object
      required: [planId, accountLabel, status]
      properties:
        planId: { type: string }
        accountLabel: { type: string }
        status: { type: string }
        actualPrice: { type: [number, 'null'] }
        currency: { type: [string, 'null'] }
        nextBillingDate: { type: [string, 'null'], format: date }
        autoRenews: { type: [boolean, 'null'] }
        usageTrackingMode: { type: string }
        usageCheckInstructions: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
    ModelAccess:
      allOf:
        - { $ref: '#/components/schemas/ModelAccessWrite' }
        - type: object
          required: [id]
          properties:
            id: { type: string }
    ModelAccessWrite:
      type: object
      required: [modelId, planId, availability, accessMethod]
      properties:
        modelId: { type: string }
        planId: { type: string }
        providerModelId: { type: [string, 'null'] }
        availability: { enum: [confirmed, unconfirmed, unavailable, removed] }
        accessMethod: { type: string }
        apiCompatible: { type: [boolean, 'null'] }
        cliOnly: { type: boolean, default: false }
        webOnly: { type: boolean, default: false }
        limitations: { type: [string, 'null'] }
    ImportJob:
      type: object
      required: [id, filename, status, createdAt]
      properties:
        id: { type: string }
        filename: { type: string }
        status: { type: string }
        previewSummary: { type: [object, 'null'], additionalProperties: true }
        commitSummary: { type: [object, 'null'], additionalProperties: true }
        createdAt: { type: string, format: date-time }
