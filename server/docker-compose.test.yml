# Local-only Postgres for running the TABS server tests.
# This is NOT the production stack. The production stack lives in docker-compose.yml
# at the repo root and is added in a later slice.
#
# Usage (from the repo root or from server/):
#   docker compose -f server/docker-compose.test.yml up -d
#   npm --prefix server run test
#   docker compose -f server/docker-compose.test.yml down -v
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: tabs-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: tabs_test
      POSTGRES_USER: tabs
      POSTGRES_PASSWORD: tabs
    ports:
      - "5433:5432"  # avoid clashing with a system Postgres on 5432
    volumes:
      - tabs_pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabs -d tabs_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tabs_pg_test_data:
