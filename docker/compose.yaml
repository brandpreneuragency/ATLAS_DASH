services:
  postgres:
    image: postgres:16-alpine
    container_name: model-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: modelmonitor
      POSTGRES_PASSWORD: modelmonitor
      POSTGRES_DB: modelmonitor
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelmonitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
